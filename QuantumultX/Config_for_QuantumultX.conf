[general]
# 用于节点延迟测试（以下任意选择一个即可）
server_check_url = http://www.gstatic.com/generate_204
;server_check_url = http://www.google-analytics.com/generate_204
;server_check_url = http://cp.cloudflare.com/generate_204
;server_check_url = http://connectivitycheck.platform.hicloud.com/generate_204
# 服务器测试超时时间 (毫秒)
server_check_timeout = 5000
# 用于网络通信测试，http协议即可
network_check_url = http://www.apple.com/library/test/success.html
# 用于设置图标显示
;profile_img_url = https://raw.githubusercontent.com/curtinp118/QuantumultX/refs/heads/main/icons/Curtin.jpg
# 用于Check节点IP地址(以下任意选一个即可)
geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/IP_API.js
;geo_location_checker = http://ip-api.com/json/?lang=zh-CN, https://raw.githubusercontent.com/Orz-3/Orz-3/master/QuantumultX/IP.js
# 功能强大的解析器，用于引用资源的转换
resource_parser_url = https://raw.githubusercontent.com/KOP-XIAO/QuantumultX/master/Scripts/resource-parser.js
# 排除特定路由
excluded_routes = 239.255.255.250/32, 24.105.30.129/32, 185.60.112.157/32, 185.60.112.158/32, 182.162.132.1/32
# 排除特定的UDP端口，一般节点都支持代理UDP流量，非必要不开启,删除下方的“;”即可
;udp_whitelist=1-442, 444-65535
# 第一个filter为4g模式开启规则分流，第二个filter为其他wifi下开启规则分流，第三个wifi1修改成你路由器翻墙的wifi名开启直连模式，第四个wifi2为你公司或者其他有路由器翻墙的WiFi名走直连）
# 默认关闭根据wifi切换模式，如需开启，删除下方的";"即可
;running_mode_trigger = filter, filter, wifi1:all_direct, wifi2: all_direct
# DNS排除列表，一般国内域名
dns_exclusion_list = *.10099.com.cn, *.cmpassport.com, *.jegotrip.com.cn, *.icitymobile.mobi, id6.me, *.pingan.com.cn
# UDP端口屏蔽 STUN、QUIC 等协议的数据包，如需强制禁用QUIC/WebRTC可取消下一行注释；默认不全局丢弃，避免FaceTime/游戏/语音异常
udp_drop_list = 443, QUIC
fallback_udp_policy = direct
icmp_auto_reply = true
# 用于在特定场景切换代理策略，前两个 filter 表示在移动蜂窝网络和一般Wi-Fi下，走 filter(分流)模式，asus-5g 则切换为全局直连，asus 切换为全局代理，(如需使用，相应 SSID 换成你自己 Wi-Fi 名即可)
;running_mode_trigger=filter, filter, asus-5g:all_direct, asus:all_proxy

# 连接特定Wi-Fi网络下暂停工作(仅 task 模块会继续工作)，多个Wi-Fi用“,”连接
;ssid_suspended_list = asus-5g, asus


[dns]
# 推荐使用doh-server，用于DNS加密
doh-server = https://223.5.5.5/dns-query, https://223.6.6.6/dns-query
# Quantumult X 开启IPV6方法，注释掉下面的「no-ipv6」，在「VPN」栏中，开启「兼容性增强」
;no-ipv6
# 禁用系统DNS
no-system
# DNS服务器列表
